<div class="container app-page d-flex justify-content-center align-items-center py-4">
  <div class="panel-card signup-card p-5 bg-white shadow-lg rounded">
    <div class="text-center mb-4">
      <h2 class="signup-title">Create Account</h2>
      <p class="text-muted">Join us by creating a new account</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-6 form-floating">
          <input id="idName" type="text" class="form-control input-control" placeholder="John" formControlName="name" />
          <label for="idName" class="ms-2">First Name</label>
        </div>

        <div class="col-md-6 form-floating">
          <input id="idLastName" type="text" class="form-control input-control" placeholder="Doe" formControlName="last_name" />
          <label for="idLastName" class="ms-2">Last Name</label>
        </div>

        <div class="col-md-6 form-floating">
          <select id="idGender" class="form-select input-control" formControlName="gender">
            <option value="" disabled>Select gender</option>
            <option value="FEMALE">Female</option>
            <option value="MALE">Male</option>
            <option value="OTHER">Other / Prefer not to say</option>
          </select>
          <label for="idGender" class="ms-2">Gender</label>
        </div>

        <div class="col-md-6 form-floating">
          <input id="idDateOfBirth" type="date" class="form-control input-control" formControlName="birthday" />
          <label for="idDateOfBirth" class="ms-2">Date of Birth</label>
        </div>

        <div class="col-md-12 form-floating">
          <input id="idEmail" type="email" class="form-control input-control" placeholder="johndoe@gmail.com" formControlName="email" />
          <label for="idEmail" class="ms-2">Email</label>
        </div>

        <div class="col-md-12 form-floating">
          <input id="idCompany" type="text" class="form-control input-control" placeholder="Company Name" formControlName="company" />
          <label for="idCompany" class="ms-2">Company (Optional)</label>
        </div>

        <div class="col-md-6 form-floating password-field">
          <input id="idPassword" [type]="isPasswordVisible ? 'text' : 'password'" class="form-control input-control password-input" placeholder="Password" formControlName="password" />
          <label for="idPassword" class="ms-2">Password</label>
          <button
            class="password-toggle"
            type="button"
            [attr.aria-label]="isPasswordVisible ? 'Hide password' : 'Show password'"
            (click)="togglePasswordVisibility()"
          >
            @if (isPasswordVisible) {
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M13.359 11.238C14.408 10.36 15.12 9.235 15.515 8c-1.204-3.293-4.102-5.5-7.515-5.5a7.51 7.51 0 0 0-3.442.832l1.163 1.163A5.96 5.96 0 0 1 8 4c2.484 0 4.63 1.525 5.62 4-0.273.682-0.64 1.295-1.09 1.825z"/>
                <path d="M11.297 9.176a3.5 3.5 0 0 0-4.473-4.473l1.08 1.08a2 2 0 0 1 2.313 2.313z"/>
                <path d="M3.35 5.228C2.307 6.104 1.598 7.225 1.204 8.456c1.205 3.293 4.102 5.5 7.515 5.5a7.52 7.52 0 0 0 3.43-.826l-1.163-1.163a5.97 5.97 0 0 1-2.267.489c-2.485 0-4.63-1.525-5.62-4 .272-.68.637-1.291 1.084-1.819z"/>
                <path d="M10.379 7.056a2 2 0 0 0-2.435-2.435z"/>
                <path d="m13.646 14.354-12-12 .708-.708 12 12z"/>
              </svg>
            } @else {
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13.1 13.1 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13.1 13.1 0 0 1 14.828 8q-.087.164-.195.347c-.335.57-.804 1.234-1.465 1.896C11.879 11.532 10.119 12.7 8 12.7s-3.879-1.168-5.168-2.457A13.1 13.1 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
              </svg>
            }
          </button>
        </div>

        <div class="col-md-6 form-floating password-field">
          <input id="idConfirmPassword" [type]="isConfirmPasswordVisible ? 'text' : 'password'" class="form-control input-control password-input" placeholder="Confirm Password" formControlName="confirmPassword" />
          <label for="idConfirmPassword" class="ms-2">Confirm Password</label>
          <button
            class="password-toggle"
            type="button"
            [attr.aria-label]="isConfirmPasswordVisible ? 'Hide confirm password' : 'Show confirm password'"
            (click)="toggleConfirmPasswordVisibility()"
          >
            @if (isConfirmPasswordVisible) {
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M13.359 11.238C14.408 10.36 15.12 9.235 15.515 8c-1.204-3.293-4.102-5.5-7.515-5.5a7.51 7.51 0 0 0-3.442.832l1.163 1.163A5.96 5.96 0 0 1 8 4c2.484 0 4.63 1.525 5.62 4-0.273.682-0.64 1.295-1.09 1.825z"/>
                <path d="M11.297 9.176a3.5 3.5 0 0 0-4.473-4.473l1.08 1.08a2 2 0 0 1 2.313 2.313z"/>
                <path d="M3.35 5.228C2.307 6.104 1.598 7.225 1.204 8.456c1.205 3.293 4.102 5.5 7.515 5.5a7.52 7.52 0 0 0 3.43-.826l-1.163-1.163a5.97 5.97 0 0 1-2.267.489c-2.485 0-4.63-1.525-5.62-4 .272-.68.637-1.291 1.084-1.819z"/>
                <path d="M10.379 7.056a2 2 0 0 0-2.435-2.435z"/>
                <path d="m13.646 14.354-12-12 .708-.708 12 12z"/>
              </svg>
            } @else {
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13.1 13.1 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13.1 13.1 0 0 1 14.828 8q-.087.164-.195.347c-.335.57-.804 1.234-1.465 1.896C11.879 11.532 10.119 12.7 8 12.7s-3.879-1.168-5.168-2.457A13.1 13.1 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
              </svg>
            }
          </button>
        </div>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger mt-4" role="alert">{{ errorMessage }}</div>
      }

      <div class="d-grid gap-2 mt-5">
        <button class="btn btn-custom auth-submit-btn py-2" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Creating Account...' : 'Create Account' }}
        </button>
        <a routerLink="/" class="btn btn-outline-secondary w-100 py-2">Go back</a>
      </div>
    </form>
  </div>
</div>
