      <img src="/img/Rockwell_Automation_Logo.png" alt="Rockwell Automation" class="app-brand__logo" />
    </a>

    <nav class="app-nav" aria-label="Primary">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>

      <a routerLink="/login" routerLinkActive="is-active">Login</a>
      <a routerLink="/signin" routerLinkActive="is-active" class="app-nav__cta">Sign Up</a>
    </nav>
  </div>
</header>
