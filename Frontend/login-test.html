<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pro - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            
            <div class="card card-custom p-4 shadow">
                <div class="text-center mb-4">
                    <h3>Iniciar Sesión</h3>
                    <p class="text-white-50">Accede a tu videojuego</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Usuario o Correo</label>
                        <input type="text" class="form-control" placeholder="Ej: Player1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3 py-2">
                        Entrar al Mundo
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small>¿No tienes cuenta? <a href="#" class="text-info">Regístrate aquí</a></small>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
