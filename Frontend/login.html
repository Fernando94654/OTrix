<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styleForm.css">
    <title>Login - Rockwell Automation Game</title>
</head>
<body class="fondo">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="bloque p-5 bg-white shadow-lg rounded" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <h2 style="color: #cd163f; font-weight: bold;">Welcome Back</h2>
                <p class="text-muted">Please sign in to continue</p>
            </div>
            
            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="email" name="email" id="idEmail" class="form-control input-control" placeholder="name@example.com" required>    
                    <label for="idEmail">Email Address</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="password" name="password" id="idPassword" class="form-control input-control" placeholder="Password" required>    
                    <label for="idPassword">Password</label>
                </div>
                
                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-custom w-100 py-2" style="max-width: none;" type="submit">Sign In</button>
                    <a href="index.html" class="btn btn-outline-secondary w-100 py-2">Go back</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
