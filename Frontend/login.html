<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"  crossorigin="anonymous">
    <link rel="stylesheet" href="styleForm.css">
    <title>Document</title>
</head>
<body class="fondo">
    <div class="container">
        <div class="row bloque mx-auto my-center" >
            <form onsubmit="validarFormulario(event)">
                <div class="text-begin mt-3">
                    <label for="idEmailUsername" class="fw-bold sub-title">
                        Username/Email
                    </label>
                    <input type="text" name="usernameEmail" id="idEmailUsername" placeholder="John123"  class="input-control" required>    
                </div>
                
                <div class="text-begin mt-3">
                    
                    <label for="idPassword" class="fw-bold sub-title">
                    Password
                    </label>
                    
                    <input type="password" name="password" id="idPassword" class="input-control" required>    
                </div>
                
                <div class="text-end">
                    <button class="btn btn-custom mt-4" type="submit">Send</button>

                </div>
            </form>
            <div class="text-end">
                <a href="index.html"> <button class="btn btn-custom mt-2"> Go back</button></a>
            </div>
        </div>
    </div>
    

    <script src="index.js"></script>
</body>
</html>
