<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styleForm.css">
    <title>Document</title>
</head>
<body class="fondo">
    <div class="container">
        <div class="row bloque mx-auto my-center">
            

            <div class="mt-3 text-begin">
                <label for="input_name" class="fw-bold" >
                    Name
                </label>
                
                <input type="text" placeholder="Ej. John" name="name" id="input_name" c1
                class="input-control" required>

            </div>

            <div class="mt-3 text-begin">
                <label for="input_lastName" class="fw-bold">
                    Last Name
                </label>

                <input type="text" placeholder="Ej. Doe" name="lastName" id="input_lastName" class="input-control" required>
            </div>

            <div class="mt-3 text-begin">
                <label for="input_email" class="fw-bold">
                    Email
                </label>

                <input  type="email" placeholder="Ej. johndoe@gmail.com" class="input-control" id="input_email" required> 
            </div>

            <div class="mt-3 text-begin">
                <label for="input_username" class="fw-bold">
                    Username
                </label>
                
                <input type="text" placeholder="Ej. John123" name="username" class="input-control" id="input_username" required>
            </div>

            <div class="mt-3 text-begin">
                <label for="input_password" class="fw-bold">
                    Password
                </label>
                
                <input class="input-control" type="password" placeholder="Ej. 12345678" name="password" id="input_password" required>
            </div>

            <div class="mt-3 text-begin">
                <label class="fw-bold">
                    Confirm password
                </label>
                
                <input class="input-control" type="password" name="password" id="input_password" required>
            </div>

            <div class="mt-3 text-begin">
                <label for="input_worker" class="fw-bold">
                    Are you a worker from the company?
                </label>

                <p>yes</p> <input class="input-control" type="checkbox" name="checkbox" id="input_worker"> 
                
                <p>no</p> <input class="input-control" 
                type="checkbox" name="worker" id="input_worker"> 
            </div>

            <div class="text-end">
                <a href="videogame.html"><button class="btn btn-custom mt-4">Send</button></a>

                <a href="index.html"> <button class="btn btn-custom mt-4 mx-2"> Go back</button></a>
            </div>

        </div>
            
    </div>
                
        

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
