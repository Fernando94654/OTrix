<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styleForm.css">
    <title>Sign Up - Rockwell Automation Game</title>
</head>
<body class="fondo">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 2rem 0;">
        <div class="bloque p-5 bg-white shadow-lg rounded" style="width: 100%; max-width: 600px;">
            <div class="text-center mb-4">
                <h2 style="color: #cd163f; font-weight: bold;">Create Account</h2>
                <p class="text-muted">Join us by creating a new account</p>
            </div>
            
            <form id="signupForm">
                <div class="row g-3">
                    <div class="col-md-6 form-floating">
                        <input type="text" name="name" id="idName" class="form-control input-control" placeholder="John" required>
                        <label for="idName" class="ms-2">First Name</label>
                    </div>

                    <div class="col-md-6 form-floating">
                        <input type="text" name="lastName" id="idLastName" class="form-control input-control" placeholder="Doe" required>
                        <label for="idLastName" class="ms-2">Last Name</label>
                    </div>

                    <div class="col-md-6 form-floating">
                        <select name="gender" id="idGender" class="form-select input-control" required>
                            <option value="" disabled selected>Select gender</option>
                            <option value="FEMALE">Female</option>
                            <option value="MALE">Male</option>
                            <option value="OTHER">Other / Prefer not to say</option>
                        </select>
                        <label for="idGender" class="ms-2">Gender</label>
                    </div>

                    <div class="col-md-6 form-floating">
                        <input type="date" name="DateOfBirth" id="idDateOfBirth" class="form-control input-control" required>
                        <label for="idDateOfBirth" class="ms-2">Date of Birth</label>
                    </div>

                    <div class="col-md-12 form-floating">
                        <input type="email" name="email" id="idEmail" class="form-control input-control" placeholder="johndoe@gmail.com" required> 
                        <label for="idEmail" class="ms-2">Email</label>
                    </div>

                    <div class="col-md-12 form-floating">
                        <input type="text" name="company" id="idCompany" class="form-control input-control" placeholder="Company Name">
                        <label for="idCompany" class="ms-2">Company (Optional)</label>
                    </div>
                    
                    <div class="col-md-6 form-floating">
                        <input type="password" name="password" id="idPassword" class="form-control input-control" placeholder="Password" required>
                        <label for="idPassword" class="ms-2">Password</label>
                    </div>

                    <div class="col-md-6 form-floating">
                        <input type="password" name="ConfirmPassword" id="idConfirmPassword" class="form-control input-control" placeholder="Confirm Password" required>
                        <label for="idConfirmPassword" class="ms-2">Confirm Password</label>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-5">
                    <button class="btn btn-custom w-100 py-2" style="max-width: none;" type="submit">Create Account</button>
                    <a href="index.html" class="btn btn-outline-secondary w-100 py-2">Go back</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
