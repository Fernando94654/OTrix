<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styleForm.css">
    <title>Document</title>
</head>
<body class="fondo">
    <div class="container">
        <div class="row bloque mx-auto my-center">
            

            <div class="mt-3 text-begin">
                <label for="idName" class="fw-bold" >
                    Name
                </label>
                
                <input type="text"  name="name" id="idName" placeholder="Ej. John"
                class="input-control" required>

            </div>

            <div class="mt-3 text-begin">
                <label for="idLastName" class="fw-bold">
                    Last Name
                </label>

                <input type="text"  name="lastName" id="idLastName" placeholder="Ej. Doe" class="input-control" required>
            </div>

            <div class="mt-3 text-begin">
                <label for="idGender" class="fw-bold">
                    Gender
                </label>
                <input type="text" name="gender" id="idGender" class="input-control" list="gender-options" required>

                <datalist id="gender-options">
                    <option value="Femenine"></option>
                    <option value="Masculine"></option>
                    <option value="Non binary"></option>
                    <option value="Prefer not to say"></option>
                </datalist>
                
            </div>

            <div class="mt-3 text-begin">
                <label for="idDateOfBirth" class="fw-bold">
                    Date of birth
                </label>
                <input type="date" name="DateOfBirth" id="idDateOfBirth" class="input-control" required>
    
            </div>
            
            <div class="mt-3 text-begin">
                <label for="idEmail" class="fw-bold">
                    Email
                </label>

                <input  type="email" name="email" id="idEmail" placeholder="Ej. johndoe@gmail.com" class="input-control" required> 
            </div>

            <div class="mt-3 text-begin">
                <label for="idUsername" class="fw-bold">
                    Username
                </label>
                
                <input type="text" name="username" id="idUsername" placeholder="Ej. John123"  class="input-control"  required>
            </div>

            <div class="mt-3 text-begin">
                <label for="idCompany" class="fw-bold">
                    Which company are you with
                </label> 
            </div>
            
            <div class="mt-3 text-begin">
                <label for="idPassword" class="fw-bold">
                    Password
                </label>
                
                <input type="password" name="password" id="idPassword" class="input-control"  placeholder="Ej. 12345678"   required>
            </div>

            <div class="mt-3 text-begin">
                <label class="fw-bold">
                    Confirm password
                </label>
                
                <input class="input-control" type="password" name="ConfirmPassword"  id="idConfirmPassword" required>
            </div>

            

            <div class="text-end">
                <a href="videogame.html"><button class="btn btn-custom mt-4" type="submit">Send</button></a>

                <a href="index.html"> <button class="btn btn-custom mt-4 mx-2"> Go back</button></a>
            </div>

        </div>
            
    </div>
                
        

    
</body>
</html>
